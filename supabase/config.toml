[functions.payment-reminder-cron]
# Internal cron/invocation only.
# Caller must send `x-internal-secret: $INTERNAL_FUNCTION_SECRET`.
verify_jwt = false

[functions.notify-unconfirmed-transfers]
# Internal cron/invocation only.
# Caller must send `x-internal-secret: $INTERNAL_FUNCTION_SECRET`.
verify_jwt = false

[functions.send-chat-push-notification]
# Authenticated user endpoint.
# The handler performs its own participant checks, and Supabase should still
# require a valid JWT before invoking it.
verify_jwt = true

[functions.downgrade-expired-trials]
# Internal cron/invocation only.
# Caller must send `x-internal-secret: $INTERNAL_FUNCTION_SECRET`.
verify_jwt = false

[functions.admin-session]
# Authenticated admin session mint/validate endpoint.
verify_jwt = true

[functions.verify-payment-slip]
# Authenticated user endpoint.
# Borrower invokes after submit_installment_slip; lender may invoke on demand.
# Handler validates the caller is a participant of the agreement that owns the
# slip_verifications row before reading the slip and calling the OCR provider.
verify_jwt = true
